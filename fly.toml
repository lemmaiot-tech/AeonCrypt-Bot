# fly.toml - Fly.io configuration for Mube-ChatBot (AeonCrypt)

app = "mube-chatbot"
primary_region = "jnb"  # Johannesburg, closest to Nigeria (Africa/Lagos)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# Health check configuration
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

# Machine configuration
[machine]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Persistent storage for SQLite database, vector store, and uploads
[mounts]
  source = "data"
  destination = "/app/data"